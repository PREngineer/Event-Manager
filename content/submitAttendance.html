
<!DOCTYPE html>
<html lang="en">

  <!-- ******************* Head Section ******************* -->
  <head>
    <!-- Application Name -->
    <title>Submit Attendance</title>

    <!-- Encoding and Mobile First -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap core CSS -->
    <link href="../theme/css/bootstrap-theme.min.css" rel="stylesheet">
    <link href="../theme/css/bootstrap.min.css" rel="stylesheet">

    <!-- Importing jQuery and other dependencies -->
    <script src="../theme/js/jquery-3.2.1.min.js"></script>

    <!-- Bootstrap JavaScript -->
    <script src="../theme/js/bootstrap.js"></script>
  </head>

  <body>

<!-- Form STARTS here -->

<!-- ******************* Form Heading *************************** -->
<div class="container">
  <div align="left" style="margin-top:25px">
    <strong style="font-size:25px"> Submit Attendance
    </strong>
  </div>
<form>

<p id="demo"> </p>

<!-- ******************* Enterprise ID, First Name, Middle Initial & Last Name ******************* -->
<input type="file" id="myFile" multiple size="50" onchange="getFile()">

<script>
function getFile(){
var x = document.getElementById("myFile");
var txt = "";
if ('files' in x) {
    if (x.files.length == 0) {
        txt = "Select one or more files.";
    }
    else {
        for (var i = 0; i < x.files.length; i++) {
            txt += "<br><strong> Selected File " + (i+1) + "</strong><br>";
            var file = x.files[i];
            if ('name' in file) {
                txt += "File Name: " + file.name + "<br>";
            }
        }
    }
}
else {
    if (x.value == "") {
        txt += "Select one or more files.";
    } else {
        txt += "The files property is not supported by your browser!";
        txt += "<br>The path of the selected file: " + x.value; // If the browser does not support the files property, it will return the path of the selected file instead.
    }
}
document.getElementById("demo").innerHTML = txt;
}
</script>

<!-- ******************* Submit, Clear & Cancel Button ******************* -->
  </div >
    <div align="center">
      <button  type="submit" class="btn">Submit</button>
      <button  type="refresh" class="btn">Clear</button>
    </div>
</form>

</div>

<!-- Form ENDS here -->

</body>

</html>

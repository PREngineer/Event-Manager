<!DOCTYPE html>
<html lang="en">

  <!-- ******************* Head Section ******************* -->
  <head>
    <!-- Application Name -->
    <title>Event Manager</title>

    <!-- Encoding and Mobile First -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap core CSS -->
    <link href="../theme/css/bootstrap-theme.min.css" rel="stylesheet">
    <link href="../theme/css/bootstrap.min.css" rel="stylesheet">
    <link href="../theme/css/bootstrap-datepicker3.standalone.min.css" rel="stylesheet">
    <link href="../theme/css/bootstrap-datepicker3.min.css" rel="stylesheet">

    <!-- Importing jQuery and other dependencies -->
    <script src="../theme/js/jquery-3.2.1.min.js"></script>
    <script src="../theme/js/bootstrap-datepicker.min.js"></script>
    <script src="../theme/js/BootstrapValidator.min.js"></script>

    <!-- Bootstrap JavaScript -->
    <script src="../theme/js/bootstrap.js"></script>
  </head>

  <body>
    <!--Skip Navigation Link-->
    <a class="skip-navigation sr-only sr-only-focusable" href="#page_title">Skip Navigation</a>

    <!-- ******************* START FORM ******************* -->
    <form class="container" method="POST" id="loginPage">
     <input name="action" type="hidden" value="loginPage">

      <!-- Heading -->
      <h1 id="page_title" tabindex="-1" role="heading" aria-level="1">Management Login</h1>

      <hr>

      <p><strong>All fields marked with an asterisk ( <label class="text-danger">*</label> ) are required. </strong></p>

      <div class="form-group">
        <label for="enterpriseID"> <label class="text-danger">*</label> Enterprise ID</label>
        <div class="input-group">
          <span class="input-group-addon">
            <i class="glyphicon glyphicon-user"></i>
          </span>
          <input name="loginID" type="text" class="form-control" id="loginID" placeholder="john.p.doe@company.com" aria-describedby="loginIDHelp" required>
        </div>
        <small id="loginIDHelp" class="sr-only form-text text-muted">Format:john.p.doe@company.com"</small>
      </div>

      <div class="form-group">
        <label for="Password"> <label class="text-danger">*</label> Password</label>
        <div class="input-group">
          <span class="input-group-addon">
            <i class="glyphicon glyphicon-lock"></i>
          </span>
          <input name="passwordID" type="password" class="form-control" id="passwordID" required>
        </div>
      </div>

      <!--Login Button-->
    </div >
      <div align="center">
        <button type="login" class="btn">Login</button>
      </div>

    </form>


    <!-- ******************* END FORM ******************* -->

  </body>
  <script type="text/javascript">

     $(document).ready(function() {
      $('#loginPage').bootstrapValidator({
          // To use feedback icons, ensure that you use Bootstrap v3.1.0 or later
          feedbackIcons: {
              valid: 'glyphicon glyphicon-ok',
              invalid: 'glyphicon glyphicon-remove',
              validating: 'glyphicon glyphicon-refresh'
          },
          fields: {
              loginID: {
                  validators: {
                      notEmpty: {
                          message: 'ERROR: Please enter your Enterprise ID.'
                      }
                  }
              },

              passwordID: {
                  validators: {
                      notEmpty: {
                          message: 'ERROR: Please enter your password.'
                      }
                  }
              },
          }
        })

          .on('success.form.bv', function(e) {
              $('#success_message').slideDown({ opacity: "show" }, "slow")
                  $('#loginPage').data('bootstrapValidator').resetForm();

              // Prevent form submission
              e.preventDefault();

              // Get the form instance
              var $form = $(e.target);

              // Get the BootstrapValidator instance
              var bv = $form.data('bootstrapValidator');

              // Use Ajax to submit form data
              $.post($form.attr('action'), $form.serialize(), function(result) {
                  console.log(result);
              }, 'json');
          });
  });

  </script>
</html>
